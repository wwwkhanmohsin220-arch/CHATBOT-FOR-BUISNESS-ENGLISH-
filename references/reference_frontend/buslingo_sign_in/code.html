<style>
        body {
            background-color: #0A0A0F;
            background-image: radial-gradient(circle at center, rgba(129, 140, 248, 0.03) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        
        .signin-card {
            background-color: #131318;
            border: 1px solid #242430;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin: 20px;
        }
        
        .buslingo-logo {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }
        
        .buslingo-logo .dot {
            color: #818CF8;
        }
        
        .welcome-heading {
            font-size: 22px;
            font-weight: 600;
            color: white;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .google-btn {
            width: 100%;
            height: 48px;
            background-color: #1C1C23;
            border: 1px solid #242430;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #F2F2F2;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .google-btn:hover {
            border-color: #3F3F4E;
            background-color: #242430;
        }
        
        .divider-container {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }
        
        .divider-line {
            flex-grow: 1;
            height: 1px;
            background-color: #242430;
        }
        
        .divider-text {
            color: #5F5F6B;
            font-size: 13px;
            padding: 0 12px;
            background-color: #131318;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            color: #A0A0AB;
            font-size: 13px;
            margin-bottom: 6px;
        }
        
        .form-input {
            width: 100%;
            height: 48px;
            background-color: #1C1C23;
            border: 1px solid #242430;
            border-radius: 10px;
            padding: 0 16px;
            color: white;
            font-size: 15px;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #818CF8;
        }
        
        .form-input::placeholder {
            color: #52525B;
        }
        
        .password-container {
            position: relative;
        }
        
        .eye-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #A0A0AB;
            cursor: pointer;
            font-size: 20px;
        }
        
        .forgot-link {
            display: block;
            text-align: right;
            color: #818CF8;
            font-size: 13px;
            margin-top: 8px;
            text-decoration: none;
        }
        
        .forgot-link:hover {
            text-decoration: underline;
        }
        
        .submit-btn {
            width: 100%;
            height: 48px;
            background-color: #818CF8;
            color: #0A0A0F;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s ease;
        }
        
        .submit-btn:hover {
            opacity: 0.9;
        }
        
        .footer-text {
            color: #A0A0AB;
            font-size: 14px;
            text-align: center;
            margin-top: 24px;
        }
        
        .signup-link {
            color: #818CF8;
            text-decoration: none;
        }
        
        .signup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="signin-card">
<div class="buslingo-logo">
            Busl<span class="dot">i</span>ngo
        </div>
<div class="welcome-heading">Welcome back</div>
<button class="google-btn mb-4">
<svg fill="none" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Continue with Google
        </button>


<div class="footer-text">
            Don't have an account? <a class="signup-link" href="#">Sign up</a>
</div>
</div>


</body></html>
