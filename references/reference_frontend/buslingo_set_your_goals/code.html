<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Buslingo - Onboarding Goals</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "secondary-fixed": "#e3e1f1",
                            "outline": "#908f9e",
                            "on-surface": "#e4e1e9",
                            "on-background": "#e4e1e9",
                            "on-surface-variant": "#c6c5d5",
                            "primary-fixed": "#e0e0ff",
                            "secondary-fixed-dim": "#c7c5d5",
                            "primary": "#bdc2ff",
                            "primary-fixed-dim": "#bdc2ff",
                            "surface-bright": "#39383e",
                            "background": "#131318",
                            "on-tertiary-container": "#3e2b00",
                            "on-primary-fixed-variant": "#2f3aa3",
                            "on-tertiary-fixed": "#261900",
                            "error-container": "#93000a",
                            "tertiary": "#f7bd3e",
                            "outline-variant": "#454653",
                            "inverse-on-surface": "#303036",
                            "on-secondary-fixed-variant": "#464553",
                            "on-primary-fixed": "#000767",
                            "surface-tint": "#bdc2ff",
                            "surface-container-high": "#2a292f",
                            "surface-variant": "#35343a",
                            "surface-container-low": "#1b1b20",
                            "error": "#ffb4ab",
                            "secondary-container": "#464553",
                            "tertiary-container": "#c08d00",
                            "on-secondary-fixed": "#1a1b26",
                            "surface-dim": "#131318",
                            "secondary": "#c7c5d5",
                            "on-error-container": "#ffdad6",
                            "tertiary-fixed": "#ffdea3",
                            "surface": "#131318",
                            "on-primary": "#131e8c",
                            "on-tertiary-fixed-variant": "#5d4200",
                            "surface-container-highest": "#35343a",
                            "primary-container": "#818cf8",
                            "inverse-primary": "#4953bc",
                            "on-tertiary": "#402d00",
                            "on-secondary": "#2f2f3c",
                            "on-primary-container": "#101b8a",
                            "surface-container": "#1f1f25",
                            "inverse-surface": "#e4e1e9",
                            "surface-container-lowest": "#0e0e13",
                            "on-error": "#690005",
                            "on-secondary-container": "#b5b3c3",
                            "tertiary-fixed-dim": "#f7bd3e"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                    },
                    "spacing": {
                            "margin_tablet": "32px",
                            "card_padding_std": "20px",
                            "margin_mobile": "20px",
                            "card_padding_feat": "28px",
                            "base_grid": "4px",
                            "gutter": "24px",
                            "margin_desktop": "64px"
                    },
                    "fontFamily": {
                            "headline-lg": ["Inter"],
                            "headline-lg-mobile": ["Inter"],

                    },
                    "fontSize": {

                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                            "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],

                            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                            "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]

                }
            }
        }

<style>
        .shader-bg {
            background-color: #0A0A0F;
            background-image: radial-gradient(circle at 20% 30%, rgba(129, 140, 248, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(129, 140, 248, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }
        
        /* Simulating the slow moving geometric shader */
        .shader-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .chip-selected {
            background-color: rgba(129, 140, 248, 0.06);
            border-color: #818CF8;
            color: #818CF8;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex flex-col relative shader-bg">
<!-- Shader Overlay for Background -->
<div class="shader-overlay"></div>
<!-- Progress Bar -->
<div class="w-full h-[3px] bg-surface-container-high z-10 relative">
<div class="h-full bg-primary-container w-full"></div>
</div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center justify-center px-margin_mobile md:px-margin_desktop z-10 relative">
<div class="max-w-[560px] w-full flex flex-col items-center">
<!-- Headers -->
<div class="text-center mb-8">
<h1 class="text-on-background font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg mb-2">
                    What do you want to improve?
                </h1>
<p class="text-outline font-body-sm text-body-sm">
                    Select all that apply. We'll tailor your learning path.
                </p>
</div>
<!-- Chip Grid -->
<div class="flex flex-wrap gap-[10px] justify-center mb-10 w-full">
<!-- Chip: Business emails (Unselected) -->
<button class="h-[42px] px-[22px] rounded-full bg-surface border border-surface-container-highest text-outline hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
                    Business emails
                </button>
<!-- Chip: Meetings & discussions (Selected) -->
<button class="chip-selected h-[42px] px-[22px] rounded-full border hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
                    Meetings &amp; discussions
                </button>
<!-- Chip: Presentations (Selected) -->
<button class="chip-selected h-[42px] px-[22px] rounded-full border hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
                    Presentations
                </button>
<!-- Chip: Job interviews (Unselected) -->
<button class="h-[42px] px-[22px] rounded-full bg-surface border border-surface-container-highest text-outline hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
                    Job interviews
                </button>
<!-- Chip: Negotiations (Unselected) -->
<button class="h-[42px] px-[22px] rounded-full bg-surface border border-surface-container-highest text-outline hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
                    Negotiations
                </button>
<!-- Chip: Customer communication (Unselected) -->
<button class="h-[42px] px-[22px] rounded-full bg-surface border border-surface-container-highest text-outline hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
                    Customer communication
                </button>
<!-- Chip: Networking & small talk (Unselected) -->
<button class="h-[42px] px-[22px] rounded-full bg-surface border border-surface-container-highest text-outline hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
                    Networking &amp; small talk
                </button>
<!-- Chip: Reports & writing (Unselected) -->
<button class="h-[42px] px-[22px] rounded-full bg-surface border border-surface-container-highest text-outline hover:bg-surface-variant transition-colors duration-200 flex items-center gap-1.5 font-label-md text-label-md">
                    Reports &amp; writing
                </button>
</div>
<!-- Bottom Action -->
<button class="w-[200px] h-[48px] bg-primary-container text-[#0A0A0F] rounded-[10px] font-label-md text-label-md flex items-center justify-center hover:bg-primary transition-colors duration-200 shadow-md">
                Start learning
            </button>
</div>
</main>
<script>
        // Simple toggle logic for demo purposes
        document.querySelectorAll('.flex-wrap button').forEach(button => {
            button.addEventListener('click', function() {
                this.classList.toggle('chip-selected');
                this.classList.toggle('bg-surface');
                this.classList.toggle('border-surface-container-highest');
                this.classList.toggle('text-outline');
                
                // Toggle checkmark
                const icon = this.querySelector('.material-symbols-outlined');
                if (icon) {
                    icon.remove();
                } else {
                    const span = document.createElement('span');
                    span.className = 'material-symbols-outlined text-[14px]';
                    span.style = "font-variation-settings: 'FILL' 1;";
                    span.innerText = 'check';
                    this.prepend(span);
                }
            });
        });
    </script>
</body></html>
