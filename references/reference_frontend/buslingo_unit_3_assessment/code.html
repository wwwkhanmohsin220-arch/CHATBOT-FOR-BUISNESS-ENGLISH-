<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Buslingo - Unit Assessment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-lowest": "#0e0e13",
                      "on-secondary-fixed-variant": "#464553",
                      "surface": "#131318",
                      "surface-container-low": "#1b1b20",
                      "secondary": "#c7c5d5",
                      "on-background": "#e4e1e9",
                      "on-surface": "#e4e1e9",
                      "on-primary-fixed": "#000767",
                      "surface-tint": "#bdc2ff",
                      "on-tertiary-container": "#3e2b00",
                      "primary-fixed": "#e0e0ff",
                      "primary-container": "#818cf8",
                      "on-primary": "#131e8c",
                      "on-tertiary": "#402d00",
                      "inverse-surface": "#e4e1e9",
                      "tertiary": "#f7bd3e",
                      "surface-container-highest": "#35343a",
                      "outline": "#908f9e",
                      "on-secondary": "#2f2f3c",
                      "tertiary-fixed": "#ffdea3",
                      "secondary-container": "#464553",
                      "inverse-primary": "#4953bc",
                      "surface-container-high": "#2a292f",
                      "surface-dim": "#131318",
                      "on-primary-container": "#101b8a",
                      "inverse-on-surface": "#303036",
                      "on-tertiary-fixed-variant": "#5d4200",
                      "on-secondary-fixed": "#1a1b26",
                      "error": "#ffb4ab",
                      "on-error": "#690005",
                      "on-primary-fixed-variant": "#2f3aa3",
                      "error-container": "#93000a",
                      "surface-container": "#1f1f25",
                      "surface-bright": "#39383e",
                      "on-error-container": "#ffdad6",
                      "primary": "#bdc2ff",
                      "surface-variant": "#35343a",
                      "tertiary-container": "#c08d00",
                      "secondary-fixed": "#e3e1f1",
                      "outline-variant": "#454653",
                      "primary-fixed-dim": "#bdc2ff",
                      "background": "#131318",
                      "on-surface-variant": "#c6c5d5",
                      "tertiary-fixed-dim": "#f7bd3e",
                      "on-tertiary-fixed": "#261900",
                      "secondary-fixed-dim": "#c7c5d5",
                      "on-secondary-container": "#b5b3c3"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin_tablet": "32px",
                      "card_padding_std": "20px",
                      "card_padding_feat": "28px",
                      "margin_mobile": "20px",
                      "gutter": "24px",
                      "base_grid": "4px",
                      "margin_desktop": "64px"
              },
              "fontFamily": {
                      "display": ["Inter"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "label-sm": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "body-sm": ["Inter"]
              },
              "fontSize": {
                      "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                      "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                      "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                      "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                      "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                      "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                      "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                      "label-md": ["14px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                      "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
              }
            }
          }
        }
    </script>
<style>
        /* Custom styles for radio buttons */
        .assessment-radio:checked + div {
            border-color: #818cf8;
            background-color: rgba(129, 140, 248, 0.05);
        }
        .assessment-radio:checked + div .radio-inner {
            background-color: #818cf8;
            border-color: #818cf8;
        }
        .assessment-radio:checked + div .radio-dot {
            opacity: 1;
            transform: scale(1);
        }
        .radio-dot {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex flex-col antialiased">
<!-- Assessment Top Bar -->
<header class="fixed top-0 w-full z-50 bg-[#0A0A0F] border-b border-outline-variant h-[52px] flex items-center justify-between px-margin_desktop">
<!-- Left: Unit Info -->
<div class="flex items-center">
<h1 class="text-[#F2F2F2] font-label-md text-label-md">Unit 3 Assessment</h1>
</div>
<!-- Center: Progress Bar -->
<div class="flex-1 max-w-[200px] mx-4 hidden md:block">
<div class="w-full h-1 bg-[#242430] rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full" style="width: 33.33%;"></div>
</div>
</div>
<!-- Right: Progress Text -->
<div class="flex items-center">
<span class="text-[#A0A0AB] text-[13px] font-medium tracking-wide">Question 4 of 12</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-[100px] pb-margin_desktop px-margin_mobile md:px-0 flex flex-col items-center">
<!-- Assessment Container -->
<div class="w-full max-w-[680px] flex flex-col">
<!-- Question Content -->
<div class="mb-10 text-center">
<p class="text-[#F2F2F2] text-body-md font-body-md leading-relaxed text-left">
                    "Which phrase is most appropriate when disagreeing with a senior colleague's proposal during a board meeting?"
                </p>
</div>
<!-- Options Area -->
<form class="flex flex-col gap-4">
<!-- Option A -->
<label class="cursor-pointer relative">
<input class="assessment-radio sr-only peer" name="answer" type="radio" value="a">
<div class="bg-surface border border-[#242430] rounded-xl p-4 flex items-center gap-4 transition-all duration-200 hover:border-[#3F3F4E]">
<div class="radio-inner w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors">
<div class="radio-dot w-2.5 h-2.5 rounded-full bg-[#0A0A0F]"></div>
</div>
<span class="text-on-surface text-body-sm font-body-sm">I think you're wrong about this.</span>
</div>
</label>
<!-- Option B -->
<label class="cursor-pointer relative">
<input class="assessment-radio sr-only peer" name="answer" type="radio" value="b">
<div class="bg-surface border border-[#242430] rounded-xl p-4 flex items-center gap-4 transition-all duration-200 hover:border-[#3F3F4E]">
<div class="radio-inner w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors">
<div class="radio-dot w-2.5 h-2.5 rounded-full bg-[#0A0A0F]"></div>
</div>
<span class="text-on-surface text-body-sm font-body-sm">I completely disagree with that point.</span>
</div>
</label>
<!-- Option C -->
<label class="cursor-pointer relative">
<input class="assessment-radio sr-only peer" name="answer" type="radio" value="c">
<div class="bg-surface border border-[#242430] rounded-xl p-4 flex items-center gap-4 transition-all duration-200 hover:border-[#3F3F4E]">
<div class="radio-inner w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors">
<div class="radio-dot w-2.5 h-2.5 rounded-full bg-[#0A0A0F]"></div>
</div>
<span class="text-on-surface text-body-sm font-body-sm">I see it differently — here's my perspective.</span>
</div>
</label>
<!-- Option D -->
<label class="cursor-pointer relative">
<input class="assessment-radio sr-only peer" name="answer" type="radio" value="d">
<div class="bg-surface border border-[#242430] rounded-xl p-4 flex items-center gap-4 transition-all duration-200 hover:border-[#3F3F4E]">
<div class="radio-inner w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors">
<div class="radio-dot w-2.5 h-2.5 rounded-full bg-[#0A0A0F]"></div>
</div>
<span class="text-on-surface text-body-sm font-body-sm">That doesn't make any sense.</span>
</div>
</label>
<!-- Action Area -->
<div class="mt-8 flex justify-end">
<button class="bg-primary-container text-[#0A0A0F] h-10 px-6 rounded-[10px] font-label-md text-label-md flex items-center gap-2 hover:opacity-90 transition-opacity" type="button">
                        Next
                        <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<script>
        // Simple script to handle radio button selection styling beyond CSS
        document.querySelectorAll('.assessment-radio').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Ensure only the selected option gets the style (handled by CSS primarily, this is for any extra JS logic if needed later)
            });
        });
    </script>
</body></html>
