<!DOCTYPE html><html class="dark" lang="en"><head>

                        "surface-variant": "#35343a",
                        "surface": "#131318",
                        "on-tertiary-fixed": "#261900",
                        "on-error": "#690005",
                        "on-primary-fixed": "#000767",
                        "on-background": "#e4e1e9",
                        "primary": "#bdc2ff",
                        "tertiary-fixed": "#ffdea3",
                        "on-surface": "#e4e1e9",
                        "inverse-surface": "#e4e1e9",
                        "on-tertiary-container": "#3e2b00",
                        "on-tertiary": "#402d00",
                        "on-secondary": "#2f2f3c",
                        "on-surface-variant": "#c6c5d5",
                        "primary-fixed": "#e0e0ff",
                        "secondary-fixed-dim": "#c7c5d5",
                        "on-secondary-fixed-variant": "#464553",
                        "error-container": "#93000a",
                        "surface-tint": "#bdc2ff",
                        "on-secondary-fixed": "#1a1b26",
                        "surface-container-lowest": "#0e0e13",
                        "surface-container-low": "#1b1b20",
                        "on-primary-fixed-variant": "#2f3aa3",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#b5b3c3",
                        "primary-container": "#818cf8",
                        "on-primary": "#131e8c",
                        "inverse-primary": "#4953bc",
                        "primary-fixed-dim": "#bdc2ff",
                        "tertiary-fixed-dim": "#f7bd3e",
                        "tertiary": "#f7bd3e",
                        "outline": "#908f9e",
                        "on-primary-container": "#101b8a",
                        "secondary-container": "#464553"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "card_padding_std": "20px",
                        "margin_tablet": "32px",
                        "base_grid": "4px",
                        "margin_mobile": "20px",
                        "card_padding_feat": "28px",

                    },
                    "fontFamily": {
                        "body-md": ["Inter"],

                }
            }
        }

<style>
        body { background-color: #0A0A0F; color: #e4e1e9; overflow: hidden; }
        
        .confetti-container {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 1px;
            z-index: 100;
            pointer-events: none;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            opacity: 0;
            animation: burst 1.5s ease-out forwards;
        }

        @keyframes burst {
            0% {
                transform: translate(0, 0) scale(0) rotate(0deg);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--rot));
                opacity: 0;
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-bg {
            background-color: #131318;
            border: 1px solid #242430;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-margin_mobile md:p-margin_desktop relative">
<div class="confetti-container" id="confetti-container"></div>
<main class="w-full max-w-2xl flex flex-col items-center text-center z-10 relative">
<!-- Header -->
<div class="mb-8 fade-in-up">
<span class="material-symbols-outlined text-primary-container text-6xl mb-4" style="font-variation-settings: 'FILL' 1;">stars</span>
<h1 class="font-display text-display text-on-surface mb-2">✨ Lesson Complete!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Disagreeing Politely</p>
</div>
<!-- Rewards -->
<div class="flex gap-4 mb-12 fade-in-up delay-100">
<div class="card-bg rounded-lg px-6 py-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-headline-md text-primary-container">+45 XP</span>
</div>
<div class="card-bg rounded-lg px-6 py-3 flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-headline-md text-headline-md text-tertiary">13 day streak</span>
</div>
</div>
<!-- Skill Improvements -->
<div class="w-full grid grid-cols-1 md:grid-cols-3 gap-4 mb-12 fade-in-up delay-200">
<div class="card-bg rounded-[14px] p-card_padding_std flex flex-col items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-[#22C55E] opacity-0 group-hover:opacity-5 transition-opacity"></div>
<span class="material-symbols-outlined text-[#22C55E] mb-2 text-3xl">trending_up</span>
<h3 class="font-label-md text-label-md text-on-surface-variant mb-1">Grammar</h3>
<p class="font-headline-md text-headline-md text-[#22C55E]">+5%</p>
</div>
<div class="card-bg rounded-[14px] p-card_padding_std flex flex-col items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-primary-container opacity-0 group-hover:opacity-5 transition-opacity"></div>
<span class="material-symbols-outlined text-primary-container mb-2 text-3xl">menu_book</span>
<h3 class="font-label-md text-label-md text-on-surface-variant mb-1">Vocabulary</h3>
<p class="font-headline-md text-headline-md text-primary-container">+3 words</p>
</div>
<div class="card-bg rounded-[14px] p-card_padding_std flex flex-col items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-outline-variant opacity-0 group-hover:opacity-5 transition-opacity"></div>
<span class="material-symbols-outlined text-outline mb-2 text-3xl">record_voice_over</span>
<h3 class="font-label-md text-label-md text-on-surface-variant mb-1">Fluency</h3>
<p class="font-headline-md text-headline-md text-outline">Stable</p>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col sm:flex-row items-center justify-center gap-4 fade-in-up delay-300">
<button class="w-full sm:w-auto bg-primary-container text-background font-label-md text-label-md h-[40px] px-8 rounded-lg hover:bg-primary transition-colors flex items-center justify-center gap-2">
<span>Next lesson</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<button class="w-full sm:w-auto bg-transparent text-primary-container font-label-md text-label-md h-[40px] px-8 rounded-lg hover:bg-surface-container transition-colors flex items-center justify-center">
                Back to learning path
            </button>
</div>
</main>
<!-- Geometric background elements (Abstract) -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden flex items-center justify-center">
<svg class="w-full h-full max-w-4xl opacity-10 text-[#242430]" preserveAspectRatio="xMidYMid slice" viewBox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="40" stroke="currentColor" stroke-dasharray="2 2" stroke-width="0.5"></circle>
<circle cx="50" cy="50" fill="none" r="30" stroke="currentColor" stroke-width="0.5"></circle>
<path d="M 10 50 L 90 50 M 50 10 L 50 90" stroke="currentColor" stroke-dasharray="1 4" stroke-width="0.5"></path>
</svg>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#818CF8', '#22C55E', '#F59E0B'];
            const particleCount = 80;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('confetti');
                
                // Randomize properties
                const color = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 150; // px
                const tx = Math.cos(angle) * velocity + 'px';
                const ty = Math.sin(angle) * velocity + (Math.random() * 50) + 'px'; // bias downwards slightly for gravity effect
                const rot = (Math.random() * 720 - 360) + 'deg';
                const shape = Math.random() > 0.5 ? '50%' : '0%'; // mix circles and squares

                particle.style.backgroundColor = color;
                particle.style.borderRadius = shape;
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                particle.style.setProperty('--rot', rot);
                
                // Add slight delay variation
                particle.style.animationDelay = (Math.random() * 0.2) + 's';

                container.appendChild(particle);
            }
        });
    </script>
</body></html>
