<style>
        body {
            background-color: #0A0A0F;
            color: #e4e1e9;
            margin: 0;
            overflow: hidden; /* Prevent scrolling for splash screen */
        }
        .progress-bar-track {
            background-color: #1C1C23;
        }
        .progress-bar-fill {
            background-color: #818CF8;
            width: 33%;
        }
        .welcome-heading {
            font-family: 'Inter', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .welcome-subtext {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: #A0A0AB;
            max-width: 440px;
            margin: 0 auto;
            line-height: 1.5;
        }
        .btn-primary {
            background-color: #818CF8;
            color: #0A0A0F;
            height: 48px;
            width: 200px;
            border-radius: 10px; /* Standard UI radius */
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-primary:hover {
            background-color: #939bf9;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>

<body class="min-h-screen flex flex-col relative">
<!-- Background Shader -->

<!-- Top Progress Bar -->
<div class="absolute top-0 left-0 w-full h-[3px] progress-bar-track z-10">

</div>

<a class="btn-primary group" href="#">
